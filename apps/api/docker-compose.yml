version: "3.9"
services:
  db:
    image: postgres:16
    container_name: mydtu_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydtu_assistant
    ports:
      - "5434:5432"
    volumes:
      - mydtu_pg_data:/var/lib/postgresql/data
volumes:
  mydtu_pg_data:
  